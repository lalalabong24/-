name: Fetch Saramin Jobs

on:
  schedule:
    # 하루 2번 (UTC 0시, 12시 = 한국시간 오전 9시, 오후 9시). 직무 40개 x 2회 = 80회/일로, 일일 한도 500회보다 훨씬 적습니다.
    - cron: '0 0,12 * * *'
  workflow_dispatch: {}  # Actions 탭에서 수동으로도 실행 가능

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 사람인 API에서 채용공고 가져오기
        env:
          SARAMIN_ACCESS_KEY: ${{ secrets.SARAMIN_ACCESS_KEY }}
        run: node scripts/fetch-jobs.mjs

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          git diff --staged --quiet || git commit -m "chore: 채용공고 데이터 갱신 [skip ci]"
          git push
